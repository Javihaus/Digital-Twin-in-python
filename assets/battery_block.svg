<svg viewBox="0 0 1180 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
  <rect x="0" y="0" width="1180" height="340" fill="#ffffff"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#1B2430">Battery State-of-Health — empirical (grey-box) twin</text>
  <text x="40" y="68" font-size="14" fill="#5b5b5b">A transparent fade law carries the trend; a small estimated residual corrects it; the band is calibrated.</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1B2430"/></marker></defs>

  <!-- 5 blocks -->
  <rect x="40" y="150" width="190" height="104" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <text x="135" y="196" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Fleet data</text>
  <text x="135" y="220" font-size="13" fill="#5b5b5b" text-anchor="middle">SoH per cycle</text>
  <text x="135" y="238" font-size="13" fill="#5b5b5b" text-anchor="middle">(NASA, 8 cells)</text>

  <rect x="270" y="150" width="190" height="104" rx="5" fill="#EAF1F6" stroke="#1C4E73" stroke-width="2"/>
  <rect x="278" y="158" width="174" height="88" rx="3" fill="none" stroke="#9CC2DA"/>
  <text x="365" y="190" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Fade-law model</text>
  <text x="365" y="212" font-size="13.5" font-weight="700" fill="#1C4E73" text-anchor="middle">empirical structure</text>
  <text x="365" y="232" font-size="13" fill="#5b5b5b" text-anchor="middle">SoH0 · e^(-a n)</text>

  <rect x="500" y="150" width="190" height="104" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <text x="595" y="196" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Estimate residual</text>
  <text x="595" y="222" font-size="13" fill="#5b5b5b" text-anchor="middle">bounded correction g(n)</text>

  <rect x="730" y="150" width="190" height="104" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <text x="825" y="196" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Calibrated band</text>
  <text x="825" y="222" font-size="13" fill="#5b5b5b" text-anchor="middle">conformal interval σ(n)</text>

  <rect x="960" y="150" width="180" height="104" rx="5" fill="#1C4E73"/>
  <text x="1050" y="190" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Forecast &amp; validate</text>
  <text x="1050" y="214" font-size="12.5" fill="#dce6ee" text-anchor="middle">SoH + RUL</text>
  <text x="1050" y="232" font-size="12.5" fill="#dce6ee" text-anchor="middle">temporal split · Theil's U</text>

  <!-- wires -->
  <g stroke="#1B2430" stroke-width="1.6" fill="none">
    <path d="M230 202 L270 202" marker-end="url(#a)"/>
    <path d="M460 202 L500 202" marker-end="url(#a)"/>
    <path d="M690 202 L730 202" marker-end="url(#a)"/>
    <path d="M920 202 L960 202" marker-end="url(#a)"/>
  </g>

  <!-- note -->
  <rect x="40" y="278" width="1100" height="40" rx="8" fill="#F1EAE2" stroke="#cdbfae"/>
  <text x="590" y="303" font-size="13.5" fill="#1C4E73" font-weight="700" text-anchor="middle">Not port-Hamiltonian — capacity fade is a degradation curve. Same workflow, lighter model structure.</text>
</svg>
