<svg viewBox="0 0 1060 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
  <rect x="0" y="0" width="1060" height="440" fill="#ffffff"/>
  <text x="530" y="44" font-size="24" font-weight="700" fill="#1B2430" text-anchor="middle">otwin — grey-box digital twins</text>
  <text x="530" y="74" font-size="14" fill="#5b5b5b" text-anchor="middle">Bring the model structure you trust; otwin estimates the rest, calibrates the uncertainty, and validates without leakage.</text>

  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#B5651D"/></marker></defs>

  <!-- ===== workflow icons ===== -->
  <g stroke="#1C4E73" fill="none" stroke-width="2">
    <!-- 1 model structure -->
    <rect x="116" y="120" width="68" height="64" rx="6"/>
    <circle cx="136" cy="140" r="6" fill="#EAF1F6"/><circle cx="164" cy="140" r="6" fill="#EAF1F6"/><circle cx="150" cy="166" r="6" fill="#EAF1F6"/>
    <path d="M136 140 L164 140 M136 140 L150 166 M164 140 L150 166" stroke-width="1.6"/>
    <!-- 2 estimate -->
    <path d="M376 120 L376 184 L440 184" stroke-width="1.6"/>
    <circle cx="390" cy="174" r="3" fill="#1C4E73" stroke="none"/><circle cx="404" cy="164" r="3" fill="#1C4E73" stroke="none"/><circle cx="418" cy="156" r="3" fill="#1C4E73" stroke="none"/><circle cx="430" cy="146" r="3" fill="#1C4E73" stroke="none"/>
    <path d="M384 178 L436 140" stroke="#B5651D" stroke-width="2"/>
    <!-- 3 quantify uncertainty -->
    <polygon points="636,176 700,138 700,158 636,168" fill="#3D80A9" opacity="0.25" stroke="none"/>
    <path d="M636 172 L700 148" stroke="#1C4E73" stroke-width="2"/>
    <path d="M630 184 L630 120 M630 184 L702 184" stroke-width="1.4" stroke="#bbb"/>
    <!-- 4 validate (shield + check) -->
    <path d="M920 118 l 28 10 v 22 c 0 20 -15 32 -28 39 c -13 -7 -28 -19 -28 -39 v -22 z"/>
    <path d="M906 152 l 9 10 l 19 -22" stroke="#2E7D32" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- workflow arrows -->
  <g>
    <path d="M210 152 L356 152" stroke="#B5651D" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
    <path d="M470 152 L616 152" stroke="#B5651D" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
    <path d="M724 152 L884 152" stroke="#B5651D" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  </g>

  <!-- workflow labels -->
  <g text-anchor="middle">
    <text x="150" y="222" font-size="16" font-weight="700" fill="#1B2430">Model structure</text>
    <text x="150" y="242" font-size="12.5" fill="#5b5b5b">first-principles or empirical</text>
    <text x="408" y="222" font-size="16" font-weight="700" fill="#1B2430">Estimate</text>
    <text x="408" y="242" font-size="12.5" fill="#5b5b5b">fit residual / parameters</text>
    <text x="668" y="222" font-size="16" font-weight="700" fill="#1B2430">Quantify uncertainty</text>
    <text x="668" y="242" font-size="12.5" fill="#5b5b5b">calibrated intervals</text>
    <text x="920" y="222" font-size="16" font-weight="700" fill="#1B2430">Validate</text>
    <text x="920" y="242" font-size="12.5" fill="#5b5b5b">no leakage · vs baselines</text>
  </g>

  <!-- ===== model-structure options ===== -->
  <line x1="80" y1="290" x2="980" y2="290" stroke="#e3e3e3" stroke-width="1"/>
  <text x="80" y="322" font-size="14" font-weight="700" fill="#1B2430">Two model structures</text>

  <!-- gear icon (first-principles) -->
  <g stroke="#1C4E73" fill="none" stroke-width="2" transform="translate(120,372)">
    <circle cx="0" cy="0" r="15"/>
    <circle cx="0" cy="0" r="6"/>
    <g stroke-width="3"><line x1="0" y1="-15" x2="0" y2="-22"/><line x1="0" y1="15" x2="0" y2="22"/><line x1="-15" y1="0" x2="-22" y2="0"/><line x1="15" y1="0" x2="22" y2="0"/><line x1="-11" y1="-11" x2="-16" y2="-16"/><line x1="11" y1="11" x2="16" y2="16"/><line x1="-11" y1="11" x2="-16" y2="16"/><line x1="11" y1="-11" x2="16" y2="-16"/></g>
  </g>
  <text x="156" y="362" font-size="15" font-weight="700" fill="#1B2430">First-principles (white-box)</text>
  <text x="156" y="382" font-size="12.5" fill="#5b5b5b">known physics — port-Hamiltonian</text>

  <!-- trend icon (empirical) -->
  <g stroke="#1C4E73" fill="none" stroke-width="2" transform="translate(560,372)">
    <path d="M-20 -20 L-20 18 L24 18" stroke="#bbb" stroke-width="1.4"/>
    <path d="M-18 -14 C -4 -2, 10 14, 22 16" stroke="#3D80A9" stroke-width="2.4"/>
  </g>
  <text x="600" y="362" font-size="15" font-weight="700" fill="#1B2430">Empirical (grey-box)</text>
  <text x="600" y="382" font-size="12.5" fill="#5b5b5b">known trend — e.g. degradation</text>
</svg>
