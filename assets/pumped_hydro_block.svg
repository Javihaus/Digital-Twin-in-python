<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B2430"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B5651D"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1B2430">Pumped-hydro storage — port-Hamiltonian structure</text>
  <text x="500" y="61" text-anchor="middle" font-size="14" fill="#6B7280">gravitational energy store + reversible pump-turbine power port (conservative)</text>

  <!-- ground / elevation datum -->
  <line x1="60" y1="470" x2="940" y2="470" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="64" y="486" font-size="11" fill="#9CA3AF">lower datum (z = 0)</text>

  <!-- UPPER reservoir -->
  <path d="M120,150 L300,150 L290,205 L130,205 Z" fill="#EAF1F7" stroke="#1C4E73" stroke-width="1.8"/>
  <rect x="130" y="160" width="160" height="45" fill="#BBD3E6" opacity="0.7"/>
  <text x="210" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#1C4E73">Upper reservoir</text>
  <text x="210" y="183" text-anchor="middle" font-size="13" fill="#1B2430">V_u , area A_u</text>

  <!-- LOWER reservoir -->
  <path d="M700,415 L900,415 L890,468 L710,468 Z" fill="#EAF1F7" stroke="#1C4E73" stroke-width="1.8"/>
  <rect x="710" y="425" width="180" height="43" fill="#BBD3E6" opacity="0.7"/>
  <text x="800" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#1C4E73">Lower reservoir</text>
  <text x="800" y="450" text-anchor="middle" font-size="13" fill="#1B2430">V_l , area A_l (large)</text>

  <!-- penstock (pipe) from upper to machine to lower -->
  <line x1="240" y1="205" x2="470" y2="330" stroke="#6B7280" stroke-width="9" stroke-linecap="round"/>
  <line x1="560" y1="360" x2="770" y2="415" stroke="#6B7280" stroke-width="9" stroke-linecap="round"/>
  <text x="330" y="252" font-size="12" fill="#6B7280" transform="rotate(28 330 252)">penstock</text>

  <!-- bidirectional flow arrow along the penstock -->
  <line x1="300" y1="243" x2="430" y2="313" stroke="#B5651D" stroke-width="2" marker-start="url(#arrB)" marker-end="url(#arrB)"/>
  <text x="372" y="285" font-size="14" font-weight="700" fill="#B5651D">q</text>

  <!-- pump-turbine machine -->
  <circle cx="515" cy="345" r="40" fill="#FFFFFF" stroke="#B5651D" stroke-width="2"/>
  <text x="515" y="341" text-anchor="middle" font-size="13" font-weight="700" fill="#B5651D">pump–</text>
  <text x="515" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#B5651D">turbine</text>
  <text x="515" y="402" text-anchor="middle" font-size="11" fill="#6B7280">reversible · η_p / η_t</text>

  <!-- motor/generator + grid power port -->
  <line x1="555" y1="345" x2="660" y2="345" stroke="#1B2430" stroke-width="1.6"/>
  <rect x="660" y="320" width="74" height="50" rx="8" fill="#FFFFFF" stroke="#1C4E73" stroke-width="1.6"/>
  <text x="697" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#1C4E73">M / G</text>
  <line x1="734" y1="345" x2="820" y2="345" stroke="#1B2430" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="828" y="334" font-size="15" font-weight="600" fill="#1C4E73">u = P</text>
  <text x="828" y="352" font-size="11" fill="#6B7280">grid power</text>
  <text x="828" y="368" font-size="11" fill="#2E7D32">+ charge</text>
  <text x="905" y="368" font-size="11" fill="#B5651D">− gen</text>

  <!-- head dimension -->
  <line x1="92" y1="205" x2="92" y2="470" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="86" y1="205" x2="98" y2="205" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="86" y1="470" x2="98" y2="470" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="84" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#2E7D32" transform="rotate(-90 84 345)">net head  h = z_u + h_u − h_l</text>

  <!-- energy + structure box -->
  <rect x="120" y="250" width="300" height="70" rx="8" fill="#FBFBFC" stroke="#1B2430" stroke-width="1" opacity="0.95"/>
  <text x="135" y="274" font-size="13" font-weight="600" fill="#1B2430">stored energy</text>
  <text x="135" y="298" font-size="13" fill="#1B2430">H = ρg[ z_u V_u + V_u²/2A_u + V_l²/2A_l ]</text>
  <text x="135" y="314" font-size="11" fill="#6B7280">gravitational potential energy of both reservoirs</text>

  <!-- footer note -->
  <text x="500" y="520" text-anchor="middle" font-size="12" fill="#9CA3AF">J = 0 (no lossless circulation)   ·   R = (1/R_penstock)·[[1,−1],[−1,1]] (PSD)   ·   g = [1, −1]ᵀ   ·   pump off ⇒ dH/dt ≤ 0 (passive)</text>
</svg>
