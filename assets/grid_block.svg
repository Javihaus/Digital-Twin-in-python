<svg viewBox="0 0 1060 540" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
  <rect x="0" y="0" width="1060" height="540" fill="#ffffff"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#1B2430">Grid-scale storage dispatch</text>
  <text x="40" y="68" font-size="14" fill="#5b5b5b">Predictive maintenance feeds real-time optimization; the loop re-plans each step (receding horizon).</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1B2430"/></marker></defs>

  <!-- Source -->
  <rect x="40" y="150" width="170" height="80" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <path d="M56 206 q11 -24 22 0 t22 0" fill="none" stroke="#3D80A9" stroke-width="1.8"/>
  <text x="125" y="184" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Price / Load</text>
  <text x="125" y="222" font-size="12.5" fill="#5b5b5b" text-anchor="middle">forecast signal</text>

  <!-- SoH twin (PM) -->
  <rect x="40" y="330" width="240" height="104" rx="5" fill="#EAF1F6" stroke="#1C4E73" stroke-width="2"/>
  <rect x="48" y="338" width="224" height="88" rx="3" fill="none" stroke="#9CC2DA"/>
  <text x="160" y="368" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">SoH twin</text>
  <text x="160" y="390" font-size="14" font-weight="700" fill="#1C4E73" text-anchor="middle">Predictive Maintenance</text>
  <text x="160" y="412" font-size="12.5" fill="#5b5b5b" text-anchor="middle">capacity E-hat ± σ · degradation cost</text>

  <!-- MPC optimizer (RTO) -->
  <rect x="430" y="150" width="250" height="150" rx="5" fill="#EAF1F6" stroke="#1C4E73" stroke-width="2"/>
  <rect x="438" y="158" width="234" height="134" rx="3" fill="none" stroke="#9CC2DA"/>
  <text x="555" y="206" font-size="18" font-weight="700" fill="#1B2430" text-anchor="middle">MPC Optimizer</text>
  <text x="555" y="230" font-size="15" font-weight="700" fill="#1C4E73" text-anchor="middle">Real-Time Optimization</text>
  <text x="555" y="256" font-size="12.5" fill="#5b5b5b" text-anchor="middle">receding horizon · robust to</text>
  <text x="555" y="273" font-size="12.5" fill="#5b5b5b" text-anchor="middle">the calibrated capacity band</text>

  <!-- Plant -->
  <rect x="780" y="150" width="160" height="100" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <rect x="818" y="188" width="64" height="28" rx="2" fill="none" stroke="#1B2430" stroke-width="1.5"/>
  <rect x="882" y="195" width="7" height="14" fill="#1B2430"/>
  <text x="860" y="180" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">BESS plant</text>
  <text x="860" y="238" font-size="12.5" fill="#5b5b5b" text-anchor="middle">battery (SoC, E, P)</text>

  <!-- Scope -->
  <rect x="780" y="330" width="160" height="104" rx="5" fill="#ffffff" stroke="#1C4E73" stroke-width="1.6"/>
  <path d="M800 410 L800 356 M800 410 L922 410" stroke="#bbb" stroke-width="1.2" fill="none"/>
  <path d="M802 402 C 824 372, 866 392, 920 362" stroke="#3D80A9" stroke-width="1.8" fill="none"/>
  <text x="860" y="354" font-size="16" font-weight="700" fill="#1B2430" text-anchor="middle">Outcome</text>
  <text x="860" y="428" font-size="12" fill="#5b5b5b" text-anchor="middle">value · 9% shortfall</text>

  <!-- wires -->
  <g stroke="#1B2430" stroke-width="1.6" fill="none">
    <path d="M210 190 L320 190 L320 192 L430 192" marker-end="url(#a)"/>
    <path d="M280 382 L360 382 L360 262 L430 262" marker-end="url(#a)"/>
    <path d="M680 200 L780 200" marker-end="url(#a)"/>
    <path d="M860 250 L860 330" marker-end="url(#a)"/>
    <path d="M940 224 L985 224 L985 482 L555 482 L555 300" marker-end="url(#a)"/>
    <path d="M650 482 L160 482 L160 434" marker-end="url(#a)"/>
  </g>
  <g font-size="13" fill="#444" font-style="italic">
    <text x="312" y="184">price, load</text>
    <text x="366" y="300">capacity E-hat, cost</text>
    <text x="690" y="192">P (charge / discharge)</text>
    <text x="872" y="296">SoC, power</text>
    <text x="610" y="498">measured SoC  (receding horizon)</text>
  </g>
</svg>
