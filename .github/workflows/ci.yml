name: CI v2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev,viz]"

    - name: Run ruff linter
      run: |
        ruff check src/PKG

    - name: Run black format check
      run: |
        black --check src/PKG tests

    - name: Run mypy type checker (strict)
      run: |
        mypy --strict src/PKG

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=PKG --cov-report=term-missing --cov-report=xml --cov-fail-under=85

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  test-minimal:
    name: Test minimal install (core deps only)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install core dependencies only
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Core runtime (numpy+scipy) plus only the test runner — no torch/gp/viz.
        pip install -e .
        pip install pytest hypothesis

    - name: Run core tests (no torch/gp/viz)
      run: |
        pytest tests/systems/ tests/integrate/ tests/evaluation/ tests/utils/ tests/uq/ tests/twin/ -v

  examples:
    name: Run examples
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[viz]"

    - name: Run water tank example
      run: |
        cd examples/water_tank_phs
        timeout 300 python water_tank_demo.py
      continue-on-error: true

  benchmarks:
    name: Generate benchmarks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[viz]"

    - name: Run benchmarks
      run: |
        cd benchmarks
        timeout 600 python run_benchmarks.py
      continue-on-error: true

    - name: Verify benchmark outputs
      run: |
        ls -la benchmarks/results/ || echo "No results generated yet"
      continue-on-error: true
