name: CI v2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,torch,viz]"

    - name: Run ruff linter
      run: |
        ruff check src/PKG

    - name: Run black format check
      run: |
        black --check src/PKG tests

    - name: Run mypy type checker (strict)
      run: |
        mypy --strict src/PKG

    - name: Run tests with coverage
      run: |
        pytest --cov=PKG --cov-report=term-missing --cov-report=xml --cov-fail-under=85

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: true

  test-minimal:
    name: Test minimal install (core deps only)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install core dependencies only
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run core tests (no torch/gp/viz)
      run: |
        pytest tests/systems tests/integrate tests/evaluation -v

  examples:
    name: Run examples
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[torch,viz]"

    - name: Run water tank example
      run: |
        cd examples/water_tank_phs
        timeout 300 python water_tank_demo.py

    - name: Run battery example
      run: |
        cd examples/battery_nasa
        timeout 300 python battery_example.py

  benchmarks:
    name: Generate benchmarks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[torch,viz]"

    - name: Run benchmarks
      run: |
        cd benchmarks
        timeout 600 python run_benchmarks.py

    - name: Verify benchmark outputs
      run: |
        test -f benchmarks/results/battery.json
        test -f benchmarks/results/water_tank.json
